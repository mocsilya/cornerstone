<div id="progress-checkout">
	<div class="progress-wrapper">
		<div class="progress-line step-1">
			<div class="progress-line__circle"></div>
			<div class="progress-line__circle"></div>
			<div class="progress-line__circle"></div>
			<div class="progress-line__circle"></div>
		</div>
		<div class="progress-labels">
			<span class="progress-label--index"><b>Step 1</b>/4</span>
			<span class="progress-label--name">{{lang 'optimized_checkout.customer.customer_heading'}}</span>
		</div>
	</div>
</div>

<script nonce="{{nonce}}">

(function(win) {
    'use strict';
	
    var listeners = [], 
    doc = win.document, 
    MutationObserver = win.MutationObserver || win.WebKitMutationObserver,
    observer;
    
    function ready(selector, fn) {
        // Store the selector and callback to be monitored
        listeners.push({
            selector: selector,
            fn: fn
        });
        if (!observer) {
            // Watch for changes in the document
            observer = new MutationObserver(check);
            observer.observe(doc.documentElement, {
                childList: true,
                subtree: true
            });
        }
        // Check if the element is currently in the DOM
        check();
    }
        
    function check() {
        // Check the DOM for elements matching a stored selector
        for (var i = 0, len = listeners.length, listener, elements; i < len; i++) {
            listener = listeners[i];
            // Query for elements matching the specified selector
            elements = doc.querySelectorAll(listener.selector);
            for (var j = 0, jLen = elements.length, element; j < jLen; j++) {
                element = elements[j];
                // Make sure the callback isn't invoked with the 
                // same element more than once
                if (!element.ready) {
                    element.ready = true;
                    // Invoke the callback with the element
                    listener.fn.call(element, element);
                }
            }
        }
    }

    // Expose `ready`
    win.ready = ready;
            
})(this);

const isDesktop = window.innerWidth >= 968;
if (isDesktop) {
	document.querySelector("#progress-checkout").classList.add("progress-checkout--desktop");
}

const stepToLabel = {
	1: "{{lang 'optimized_checkout.customer.customer_heading'}}",
	2: "{{lang 'optimized_checkout.shipping.shipping_heading'}}",
	3: "{{lang 'optimized_checkout.billing.billing_heading'}}",
	4: "{{lang 'optimized_checkout.payment.payment_heading'}}",
};

const setProgressLineStep = (step) => {
	const progressLine = document.querySelector("#progress-checkout .progress-line");
	progressLine.classList = `progress-line step-${step}`;
	const progressLabelIndex = document.querySelector("#progress-checkout .progress-label--index b");
	const progressLabelName = document.querySelector("#progress-checkout .progress-label--name");
	const label = stepToLabel[step];
	progressLabelIndex.innerText = `${step}`;
	progressLabelName.innerText = label;
};

ready('.checkout-step--customer .checkout-view-content', function(element) {
    setProgressLineStep(1);
});

ready('.checkout-step--shipping #checkout-shipping-continue', function(element) {
	setProgressLineStep(2);
});

ready('.checkout-step--billing #checkout-billing-continue', function(element) {
	setProgressLineStep(3);
});

ready('.checkout-step--payment .checkout-view-content', function(element) {
	setProgressLineStep(4);
});

// Add custom classes to shipping options
function updateShippingClasses() {
    const shippingInputs = document.querySelectorAll('span.shippingOption-desc');
    shippingInputs.forEach(input => {
        const parentLi = input.closest('.form-checklist-item');
        const generatedId = 'shipping-' + input.textContent.trim().toLowerCase()
            .replace(/[^a-z0-9\s-]/g, '') // Strip brackets/punctuation
            .replace(/\s+/g, '-');         // Turn spaces into hyphens
        if (parentLi && !parentLi.classList.contains(generatedId)) {
            parentLi.classList.add(generatedId);
        }
    });
}
ready('.checkout-step--shipping .optimizedCheckout-form-checklist', function(checklist) {
    updateShippingClasses();
    checklist.addEventListener('click', function() {
        setTimeout(updateShippingClasses, 10);
    });
});

// Add custom classes to payment options
function updatePaymentClasses() {
	const paymentInputs = document.querySelectorAll('input[name="paymentProviderRadio"]');
	paymentInputs.forEach(input => {
        const parentLi = input.closest('.form-checklist-item');
        if (parentLi && input.id && !parentLi.classList.contains(input.id)) {
            parentLi.classList.add(input.id);
        }
    });
}
ready('.checkout-step--payment .optimizedCheckout-form-checklist', function(checklist) {
    updatePaymentClasses();
    checklist.addEventListener('click', function() {
        setTimeout(updatePaymentClasses, 10);
    });
});

// Stop auto scroll down to email input
ready('#email', function(inputElement) {
    inputElement.addEventListener('focus', function() {
        // This tiny delay is the only way to beat the browser's jump
        setTimeout(function() {
            window.scrollTo(0, 0);
        }, 0);
    }, { once: true }); 
});


// Handle phone number messaging when required.
var globalPhoneInput = null;
var isPhoneRequired = false;

function updateShippingMessage() {
    var messageElement = document.querySelector('.shippingOptions-panel-message');
    if (!messageElement) return;

    var currentText = messageElement.innerText.trim();
    var bcDefaultMessage = "{{lang 'optimized_checkout.shipping.enter_shipping_address_text'}}";
    var ourCustomMessage = "Please enter an address and phone number to see shipping quotes.";

    // SCENARIO 1: Phone is required, input is empty, and it's currently showing the default message
    if (isPhoneRequired && globalPhoneInput && globalPhoneInput.value.trim() === "") {
        if (currentText === bcDefaultMessage) {
            messageElement.innerText = ourCustomMessage;
        }
    } 
    // SCENARIO 2: Phone is either not required or has data; safely revert if showing our custom text
    else if (currentText === ourCustomMessage) {
        messageElement.innerText = bcDefaultMessage;
    }
}

// 1. Watch for the Phone Input to appear
ready('#phoneInput', function(inputElement) {
    globalPhoneInput = inputElement; 

    var label = document.getElementById('phoneInput-label');
    if (label) {
        // Run the check EXACTLY ONCE right here when the element mounts
        var optionalBadge = label.querySelector('.optimizedCheckout-contentSecondary');
        isPhoneRequired = !optionalBadge;
        
        // If it is required, update the label immediately
        if (isPhoneRequired) {
            label.innerHTML = 'Phone Number <small class="optimizedCheckout-contentSecondary">(Only used for delivery updates)</small>';
        }
    }

    // Listen for typing to update messages smoothly
    inputElement.addEventListener('input', updateShippingMessage);
    
    // Sync the message immediately in case the shipping panel is already open
    updateShippingMessage();
});

// 2. Watch for the Shipping Message Panel to appear (Independent, Flat)
ready('.shippingOptions-panel-message', function(messageElement) {
    updateShippingMessage();
});
</script>
